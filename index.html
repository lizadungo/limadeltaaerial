<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lima Delta Aerial</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --lime:#39ff14;
      --bg:#000;
      --white:#fff;
      --muted:rgba(255,255,255,.72);
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      min-height:100vh;
      background: var(--bg);
      color: var(--white);
      font-family: 'Montserrat', sans-serif;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }

    /* subtle “hangar haze” */
    .bg{
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(900px 500px at 50% 35%, rgba(57,255,20,.08), transparent 60%),
        radial-gradient(700px 500px at 20% 75%, rgba(57,255,20,.05), transparent 65%),
        radial-gradient(700px 500px at 80% 80%, rgba(57,255,20,.04), transparent 65%),
        linear-gradient(180deg, rgba(255,255,255,.03), transparent 40%);
      filter: blur(0px);
    }

    /* faint scanlines for “avionics” vibe */
    .scanlines{
      position:fixed;
      inset:0;
      pointer-events:none;
      opacity:.10;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.06),
        rgba(255,255,255,.06) 1px,
        transparent 1px,
        transparent 6px
      );
      mix-blend-mode: overlay;
    }

    .wrap{
      width:min(860px, 92vw);
      text-align:center;
      padding:48px 18px;
      position:relative;
      animation: fadeUp .9s ease-out both;
    }

    @keyframes fadeUp{
      from{ opacity:0; transform: translateY(14px); }
      to{ opacity:1; transform: translateY(0); }
    }

    .logo{
      display:flex;
      justify-content:center;
    }

    .logo img{
      width:min(520px, 86vw);
      height:auto;
      filter:
        drop-shadow(0 0 10px rgba(57,255,20,.55))
        drop-shadow(0 0 28px rgba(57,255,20,.25));
      animation: glow 2.8s ease-in-out infinite;
    }

    @keyframes glow{
      0%,100%{
        filter:
          drop-shadow(0 0 10px rgba(57,255,20,.45))
          drop-shadow(0 0 26px rgba(57,255,20,.22));
      }
      50%{
        filter:
          drop-shadow(0 0 14px rgba(57,255,20,.70))
          drop-shadow(0 0 34px rgba(57,255,20,.30));
      }
    }

    .services{
      margin-top:34px;
      font-weight:600;
      letter-spacing:2px;
      line-height:1.9;
      font-size: clamp(18px, 2.2vw, 22px);
      color: var(--white);
      text-transform: uppercase;
    }

    .divider{
      width:min(520px, 78vw);
      height:1px;
      margin:28px auto 22px;
      background: linear-gradient(90deg, transparent, rgba(57,255,20,.65), transparent);
      opacity:.9;
    }

    .coming{
      margin-top:0;
      font-weight:800;
      letter-spacing:6px;
      font-size: clamp(16px, 2vw, 18px);
      color: var(--lime);
      text-shadow: 0 0 10px rgba(57,255,20,.55);
      text-transform: uppercase;
    }

    .tag{
      margin-top:14px;
      font-size: 13px;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* optional: tiny animated “beacon” dot */
    .beacon{
      display:inline-block;
      width:8px;
      height:8px;
      border-radius:50%;
      background: var(--lime);
      margin-right:10px;
      box-shadow: 0 0 10px rgba(57,255,20,.8);
      animation: pulse 1.6s ease-in-out infinite;
      vertical-align: middle;
    }
    @keyframes pulse{
      0%,100%{ transform: scale(1); opacity:.9; }
      50%{ transform: scale(1.6); opacity:.35; }
    }

    /* respect reduced motion */
    @media (prefers-reduced-motion: reduce){
      .wrap, .logo img, .beacon{ animation:none !important; }
    }
  </style>
</head>

<body>
  <div class="bg"></div>
  <div class="scanlines"></div>

  <main class="wrap">
    <!-- Make sure your repo file is named exactly: logo.png -->
    <div class="logo">
      <img src="logo.png" alt="Lima Delta Aerial Logo">
    </div>

    <div class="services">
      Drone Services<br>
      Construction Documentation<br>
      Drone Repair
    </div>

    <div class="divider"></div>

    <div class="coming">
      <span class="beacon"></span>Coming Soon
    </div>

    <div class="tag">
      limadeltaaerial.com
    </div>
  </main>
</body>
</html>
