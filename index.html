<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Lima Delta Aerial | Drone Services</title>

<link rel="icon" type="image/png" sizes="512x512" href="favicon.png">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">

<style>

:root{
--lime:#39ff14;
--black:#000;
--white:#fff;
}

*{box-sizing:border-box;}

body{
margin:0;
height:100vh;
background:#000;
color:#fff;
font-family:'Montserrat',sans-serif;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
overflow:hidden;
}

/* soft green glow background */

.bg{
position:fixed;
inset:0;
pointer-events:none;
background:
radial-gradient(circle at center, rgba(57,255,20,.18), transparent 70%);
}

/* radar grid */

.grid{
position:fixed;
inset:0;
pointer-events:none;
opacity:.18;

background:
repeating-linear-gradient(
0deg,
rgba(57,255,20,.18),
rgba(57,255,20,.18) 1px,
transparent 1px,
transparent 48px
),

repeating-linear-gradient(
90deg,
rgba(57,255,20,.18),
rgba(57,255,20,.18) 1px,
transparent 1px,
transparent 48px
);
}

/* radar rings */

.rings{
position:fixed;
inset:0;
display:flex;
align-items:center;
justify-content:center;
pointer-events:none;
opacity:.40;
}

.rings::before{
content:"";
width:900px;
height:900px;
border-radius:50%;

background:

radial-gradient(circle at center,
transparent 0%,
transparent 25%,
rgba(57,255,20,.45) 25.3%,
transparent 25.6%,

transparent 45%,
rgba(57,255,20,.38) 45.3%,
transparent 45.6%,

transparent 65%,
rgba(57,255,20,.32) 65.3%,
transparent 65.6%,

transparent 85%,
rgba(57,255,20,.26) 85.3%,
transparent 85.6%
);

filter:drop-shadow(0 0 18px rgba(57,255,20,.45));
}

/* radar sweep */

.radar{
position:fixed;
inset:0;
pointer-events:none;
}

.radar::before{
content:"";
position:absolute;

width:140vmax;
height:140vmax;

left:50%;
top:50%;

transform:translate(-50%,-50%);

background:
conic-gradient(
from 0deg,
transparent 0deg,
rgba(57,255,20,.65) 16deg,
transparent 32deg
);

opacity:.32;

mix-blend-mode:screen;

animation:sweep 7s linear infinite;

filter:blur(1px);
}

@keyframes sweep{
from{transform:translate(-50%,-50%) rotate(0deg);}
to{transform:translate(-50%,-50%) rotate(360deg);}
}

/* subtle screen texture */

.scanlines{
position:fixed;
inset:0;
pointer-events:none;
opacity:.08;

background:repeating-linear-gradient(
to bottom,
rgba(255,255,255,.06),
rgba(255,255,255,.06) 1px,
transparent 1px,
transparent 6px
);
}

/* center content */

.wrapper{
position:relative;
z-index:2;
padding:40px;
}

/* logo */

.logo img{
width:420px;
max-width:85%;

filter:
drop-shadow(0 0 12px rgba(57,255,20,.65))
drop-shadow(0 0 40px rgba(57,255,20,.35));

animation:glow 3s ease-in-out infinite;
}

@keyframes glow{
0%,100%{
filter:
drop-shadow(0 0 10px rgba(57,255,20,.55))
drop-shadow(0 0 36px rgba(57,255,20,.28));
}

50%{
filter:
drop-shadow(0 0 16px rgba(57,255,20,.85))
drop-shadow(0 0 52px rgba(57,255,20,.38));
}
}

/* services */

.services{
margin-top:34px;
font-weight:600;
letter-spacing:2px;
line-height:1.9;
font-size:22px;
text-transform:uppercase;
}

/* divider */

.divider{
width:450px;
max-width:80%;
height:1px;
margin:28px auto;

background:linear-gradient(
90deg,
transparent,
rgba(57,255,20,.9),
transparent
);
}

/* coming soon */

.coming{
font-weight:800;
letter-spacing:6px;
font-size:18px;
color:#39ff14;
text-shadow:0 0 12px rgba(57,255,20,.8);
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="grid"></div>
<div class="rings"></div>
<div class="radar"></div>
<div class="scanlines"></div>

<div class="wrapper">

<div class="logo">
<img src="logo.png" alt="Lima Delta Aerial">
</div>

<div class="services">
Drone Services<br>
Construction Documentation<br>
Drone Repair
</div>

<div class="divider"></div>

<div class="coming">COMING SOON</div>

</div>

</body>
</html>
