<style>

:root{
--lime:#39ff14;
--black:#000;
--white:#fff;
}

*{ box-sizing:border-box; }

body{
margin:0;
min-height:100vh;
background:var(--black);
color:var(--white);
font-family:'Montserrat', sans-serif;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
overflow-x:hidden;
overflow-y:auto;
}

/* RADAR BACKGROUND (polar, no square grid) */

rgba(255,255,255,0.04) 1px,
transparent 1px,

}

/* range rings behind everything */
.rings{
position:fixed;
inset:0;
pointer-events:none;
display:flex;
align-items:center;
justify-content:center;
opacity:.35;
mix-blend-mode:screen;
}

.rings::before{
content:"";
width:min(108vmin, 1180px);
height:min(108vmin, 1180px);
border-radius:50%;
background:
radial-gradient(circle at center,
transparent 0%,
transparent 20%,
rgba(57,255,20,.30) 20.2%,
transparent 20.6%,

transparent 40%,
rgba(57,255,20,.26) 40.2%,
transparent 40.6%,

transparent 60%,
rgba(57,255,20,.22) 60.2%,
transparent 60.6%,

transparent 80%,
rgba(57,255,20,.18) 80.2%,
transparent 80.6%
);
filter: drop-shadow(0 0 14px rgba(57,255,20,.22));
}

/* outer bearing ring + tickmarks */
.bearingRing{
position:fixed;
inset:0;
pointer-events:none;
display:flex;
align-items:center;
justify-content:center;
opacity:.42;
mix-blend-mode:screen;
}

.bearingRing::before{
content:"";
width:min(112vmin, 1220px);
height:min(112vmin, 1220px);
border-radius:50%;
/* outer circle */
box-shadow:0 0 0 2px rgba(57,255,20,.35);
/* ticks every 15 degrees */
background:repeating-conic-gradient(
rgba(57,255,20,.55) 0deg 1deg,
transparent 1deg 15deg
);
/* show ticks only as a thin ring near the edge */
mask: radial-gradient(circle, transparent 95.7%, black 96.0%);
}

/* extra background circles / clutter */
.clutter{
position:fixed;
inset:0;
pointer-events:none;
opacity:.10; /* raise to .16 if you want more */
mix-blend-mode:screen;
filter: blur(.15px);
background:
radial-gradient(circle, rgba(57,255,20,.55) 0 2px, transparent 3px) 12% 18%/420px 420px,
radial-gradient(circle, rgba(57,255,20,.45) 0 2px, transparent 3px) 74% 24%/520px 520px,
radial-gradient(circle, rgba(57,255,20,.50) 0 2px, transparent 3px) 46% 68%/480px 480px,
radial-gradient(circle, rgba(57,255,20,.38) 0 2px, transparent 3px) 86% 78%/560px 560px,
radial-gradient(circle, rgba(57,255,20,.42) 0 2px, transparent 3px) 22% 82%/600px 600px;
animation: clutterDrift 26s linear infinite;
}

@keyframes clutterDrift{
from{ transform: translate3d(0,0,0); }
to{ transform: translate3d(90px,-70px,0); }
}

/* radar sweep */
.radar{
position:fixed;
inset:0;
pointer-events:none;
overflow:hidden;
mix-blend-mode:screen;
}

.radar::before{

}

.radar::before{

}

}
content:"";
position:absolute;
width:140vmax;
height:140vmax;
left:50%;
top:50%;
transform:translate(-50%,-50%);
background:conic-gradient(
from 0deg,
transparent 0deg,
rgba(57,255,20,.06) 10deg,
rgba(57,255,20,.16) 16deg,
rgba(57,255,20,.40) 20deg,  /* leading edge */
transparent 26deg
);
opacity:.42;
animation:sweep 8s linear infinite;
filter:blur(1px);
}

@keyframes sweep{
from{ transform:translate(-50%,-50%) rotate(0deg); }
to{ transform:translate(-50%,-50%) rotate(360deg); }
}

/* page wrapper */
.wrapper{
max-width:900px;
padding:40px;
animation:fadeUp 1s ease;
position:relative;
z-index:2;
}

@keyframes fadeUp{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

/* logo */
.logo img{
width:420px;
max-width:85%;
transition: transform .25s ease, filter .25s ease;
filter:
drop-shadow(0 0 10px rgba(57,255,20,.6))
drop-shadow(0 0 30px rgba(57,255,20,.25));
animation:glow 3s ease-in-out infinite;
}

.logo img:hover{
transform: translateY(-2px) scale(1.02);
filter:
drop-shadow(0 0 18px rgba(57,255,20,.9))
drop-shadow(0 0 60px rgba(57,255,20,.35));
}

@keyframes glow{
0%,100%{
filter:
drop-shadow(0 0 10px rgba(57,255,20,.45))
drop-shadow(0 0 26px rgba(57,255,20,.2));
}
50%{
filter:
drop-shadow(0 0 14px rgba(57,255,20,.75))
drop-shadow(0 0 36px rgba(57,255,20,.35));
}
}

/* services */
.services{
margin-top:35px;
font-weight:600;
letter-spacing:2px;
line-height:1.9;
font-size:22px;
text-transform:uppercase;
}

/* divider */
.divider{
width:450px;
max-width:80%;
height:1px;
margin:30px auto;
background:linear-gradient(90deg,transparent,var(--lime),transparent);
}

/* coming soon */
.coming{
font-weight:800;
letter-spacing:6px;
font-size:18px;
color:var(--lime);
text-shadow:0 0 10px rgba(57,255,20,.6);
}

/* footer */
.footer{
margin-top:15px;
font-size:13px;
letter-spacing:2px;
opacity:.7;
}

/* reduced motion */
@media (prefers-reduced-motion: reduce){
  .radar::before, .clutter{ animation:none !important; }
}
/* reduced motion */
@media (prefers-reduced-motion: reduce){
  .radar::before, .clutter{ animation:none !important; }
}

/* MOBILE LAYOUT FIX */
@media (max-width: 520px){

  body{
    height:auto;
    min-height:100svh;
    padding:22px 14px;
  }

  .wrapper{
    padding:22px 10px;
    max-width:100%;
  }

  .logo img{
    width:min(320px,82vw);
  }

  .services{
    margin-top:22px;
    font-size:clamp(14px,4.2vw,18px);
    letter-spacing:1.5px;
    line-height:1.7;
    padding:0 6px;
    word-break:break-word;
  }

  .divider{
    width:min(320px,80vw);
    margin:22px auto;
  }

  .coming{
    font-size:16px;
    letter-spacing:4px;
  }

  .footer{
    font-size:12px;
    letter-spacing:1.5px;
  }
}
