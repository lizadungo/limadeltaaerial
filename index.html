<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>Lima Delta Aerial | Drone Services</title>

<link rel="icon" type="image/png" sizes="512x512" href="favicon.png" />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet" />

<style>
:root{
  --lime:#39ff14;
  --black:#000;
  --white:#fff;
}

*{ box-sizing:border-box; }

body{
  margin:0;
  min-height:100vh;
  background:var(--black);
  color:var(--white);
  font-family:'Montserrat',sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  overflow:hidden;
}

/* soft ambient glow */
.bg{
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    radial-gradient(900px 650px at 50% 40%, rgba(57,255,20,.14), transparent 62%),
    radial-gradient(900px 650px at 50% 70%, rgba(57,255,20,.06), transparent 70%);
}

/* BIG range rings (bigger + brighter so you actually see them) */
.rings{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  pointer-events:none;
  opacity:.48;
  mix-blend-mode:screen;
}

.rings::before{
  content:"";
  width:min(108vmin, 1180px);
  height:min(108vmin, 1180px);
  border-radius:50%;
  background:
    radial-gradient(circle at center,
      transparent 0%,
      transparent 18%,
      rgba(57,255,20,.48) 18.2%,
      transparent 18.6%,

      transparent 36%,
      rgba(57,255,20,.40) 36.2%,
      transparent 36.6%,

      transparent 54%,
      rgba(57,255,20,.32) 54.2%,
      transparent 54.6%,

      transparent 72%,
      rgba(57,255,20,.26) 72.2%,
      transparent 72.6%,

      transparent 90%,
      rgba(57,255,20,.20) 90.2%,
      transparent 90.6%
    );
  filter: drop-shadow(0 0 18px rgba(57,255,20,.28));
}

/* outer radar ring with bearing ticks */

.bearingRing{
position:fixed;
inset:0;
pointer-events:none;
display:flex;
align-items:center;
justify-content:center;
mix-blend-mode:screen;
opacity:.45;
}

.bearingRing::before{
content:"";
width:min(112vmin,1200px);
height:min(112vmin,1200px);
border-radius:50%;

/* outer circle */
box-shadow:0 0 0 2px rgba(57,255,20,.45);

/* tick marks */
background:
repeating-conic-gradient(
rgba(57,255,20,.55) 0deg 1deg,
transparent 1deg 15deg
);

mask:
radial-gradient(circle,
transparent 96%,
black 96.3%);
}
  
/* subtle center dot (helps radar realism without crosshair lines) */
.centerDot{
  position:fixed;
  left:50%;
  top:50%;
  width:6px;
  height:6px;
  transform:translate(-50%,-50%);
  border-radius:50%;
  background:rgba(57,255,20,.55);
  box-shadow:0 0 12px rgba(57,255,20,.35);
  pointer-events:none;
  opacity:.55;
  mix-blend-mode:screen;
}

/* Darker blips (less bright, more “contact” subtlety) */
.blips{
  position:fixed;
  inset:0;
  pointer-events:none;
  opacity:.12;           /* darker overall */
  mix-blend-mode:screen;
  filter: blur(.15px);
  background:
    radial-gradient(circle, rgba(57,255,20,.55) 0 1px, transparent 2px) 12% 26%/420px 420px,
    radial-gradient(circle, rgba(57,255,20,.50) 0 1px, transparent 2px) 68% 34%/520px 520px,
    radial-gradient(circle, rgba(57,255,20,.45) 0 1px, transparent 2px) 44% 78%/480px 480px,
    radial-gradient(circle, rgba(57,255,20,.40) 0 1px, transparent 2px) 80% 70%/560px 560px;
  animation: drift 22s linear infinite;
}

@keyframes drift{
  from{ transform: translate3d(0,0,0); }
  to{ transform: translate3d(90px,-70px,0); }
}

/* REAL radar sweep: thin bright edge + soft trail */
.radar{
  position:fixed;
  inset:0;
  pointer-events:none;
  overflow:hidden;
  mix-blend-mode:screen;
}

.radar::before{
  content:"";
  position:absolute;
  width:150vmax;
  height:150vmax;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  /* trail + leading edge */
  background:conic-gradient(
    from 0deg,
    rgba(57,255,20,0.00) 0deg,
    rgba(57,255,20,0.04) 12deg,
    rgba(57,255,20,0.10) 18deg,
    rgba(57,255,20,0.22) 22deg,
    rgba(57,255,20,0.55) 24deg,  /* leading edge */
    rgba(57,255,20,0.00) 26deg,
    transparent 360deg
  );
  opacity:.55;
  filter: blur(0.8px);
  animation:sweep 6.8s linear infinite;
}

@keyframes sweep{
  from{ transform:translate(-50%,-50%) rotate(0deg); }
  to{ transform:translate(-50%,-50%) rotate(360deg); }
}

/* faint scanlines */
.scanlines{
  position:fixed;
  inset:0;
  pointer-events:none;
  opacity:.06;
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,.05),
    rgba(255,255,255,.05) 1px,
    transparent 1px,
    transparent 7px
  );
  mix-blend-mode:overlay;
}

/* center content */
.wrapper{
  position:relative;
  z-index:2;
  padding:44px 18px;
  width:min(920px, 92vw);
  animation: fadeUp .9s ease-out both;
}

@keyframes fadeUp{
  from{ opacity:0; transform: translateY(14px); }
  to{ opacity:1; transform: translateY(0); }
}

.logo{
  display:flex;
  justify-content:center;
}

.logo img{
  width:min(520px, 86vw);
  height:auto;
  filter:
    drop-shadow(0 0 12px rgba(57,255,20,.60))
    drop-shadow(0 0 44px rgba(57,255,20,.30));
  animation: glow 3s ease-in-out infinite;
}

@keyframes glow{
  0%,100%{
    filter:
      drop-shadow(0 0 10px rgba(57,255,20,.52))
      drop-shadow(0 0 38px rgba(57,255,20,.26));
  }
  50%{
    filter:
      drop-shadow(0 0 16px rgba(57,255,20,.82))
      drop-shadow(0 0 58px rgba(57,255,20,.36));
  }
}

.services{
  margin-top:34px;
  font-weight:600;
  letter-spacing:2px;
  line-height:1.9;
  font-size: clamp(18px, 2.2vw, 22px);
  text-transform: uppercase;
}

.divider{
  width:min(520px, 78vw);
  height:1px;
  margin:28px auto 20px;
  background: linear-gradient(90deg, transparent, rgba(57,255,20,.85), transparent);
  opacity:.95;
}

.coming{
  font-weight:800;
  letter-spacing:6px;
  font-size: clamp(16px, 2vw, 18px);
  color: var(--lime);
  text-shadow: 0 0 12px rgba(57,255,20,.75);
  text-transform: uppercase;
}

/* reduced motion */
@media (prefers-reduced-motion: reduce){
  .wrapper, .logo img, .radar::before, .blips{ animation:none !important; }
}
</style>
</head>

<body>
  <div class="bg"></div>
  <div class="rings"></div>
  <div class="bearingRing"></div>
  <div class="centerDot"></div>
  <div class="blips"></div>
  <div class="radar"></div>
  <div class="scanlines"></div>

  <main class="wrapper">
    <div class="logo">
      <img src="logo.png" alt="Lima Delta Aerial Logo" />
    </div>

    <div class="services">
      Drone Services<br />
      Construction Documentation<br />
      Drone Repair
    </div>

    <div class="divider"></div>

    <div class="coming">COMING SOON</div>
  </main>
</body>
</html>
